name: Build CI

on:
  workflow_dispatch:
  schedule:
    - cron: '0 5 * * *'  # This runs the action every 24 hours

env:
  REGISTRY_IMAGE: ${{ vars.DOCKERHUB_USERNAME }}/unifi-mongo

jobs:
  get-latest-build-info:
    runs-on: ubuntu-latest
    outputs:
      build_info_updated: ${{ steps.updates.outputs.build_info_updated }}
      updated_build_info_files: ${{ steps.updates.outputs.updated_build_info_files }}
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r .github/scripts/requirements.txt
    - name: Run get-major-versions script
      run: python .github/scripts/get-major-versions.py -i mongo --disable_windows --min_major 3 --max_major 8 --allowed_arch amd64 arm64 --exclude_codenames jessie stretch xenial bionic wheezy
    - name: Check for updates
      id: updates
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add build_info/*
        if git diff --cached --exit-code; then
          echo "No changes to commit"
          echo "build_info_updated=false" >> "$GITHUB_OUTPUT"
        else
          echo "Changes detected"
          echo "build_info_updated=true" >> "$GITHUB_OUTPUT"
          (echo "updated_build_info_files<<EOF" && echo "$(git diff --name-only --cached | grep 'build_info/.*build_info.json')" && echo "EOF" ) >> "$GITHUB_OUTPUT"
        fi
    - name: Commit and push build_info changes
      if: steps.updates.outputs.build_info_updated == 'true'
      run: |
        git commit -m 'Update build_info [Build CI]'
        git push origin main

  generate-build-jobs:
    needs: get-latest-build-info
    if: needs.get-latest-build-info.outputs.build_info_updated == 'true'
    runs-on: ubuntu-latest
    outputs:
      strategy_created: ${{ steps.generate-build-jobs.outputs.strategy_created }}
      strategy: ${{ steps.generate-build-jobs.outputs.strategy }}
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    - name: Pull latest
      run: git pull origin main
    - name: Run generate_build_jobs script
      id: generate-build-jobs
      run: |
        strategy="$(.github/scripts/generate_build_jobs.sh)"
        echo "strategy=$strategy" >> "$GITHUB_OUTPUT"
        jq . <<<"$strategy" # sanity check / debugging aid
        echo "strategy_created=true" >> "$GITHUB_OUTPUT"
      env:
        REGISTRY_IMAGE: ${{ env.REGISTRY_IMAGE }}
        UPDATED_BUILD_INFO_FILES: ${{ needs.get-latest-build-info.outputs.updated_build_info_files }}

  prepare-readme:
    needs: get-latest-build-info
    if: needs.get-latest-build-info.outputs.build_info_updated == 'true'
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    - name: Set up jq
      run: |
        sudo apt-get update
        sudo apt-get install -y jq
    - name: Generate badge table
      run: |
        .github/scripts/generate-badges.sh
    - name: Create README from template
      run: |
        export VERSION_BADGES_TABLE="$(cat .badges_table_content.txt)"
        export LATEST_VERSION="$(cat .badges_latest_version.txt 2>/dev/null || true)"

        envsubst < .github/templates/README.md.template > README_new.md

        if [ ! -f README_new.md ]; then
          echo "Error: README_new.md was not created"
          exit 1
        fi
        mv README_new.md README.md
    - name: Upload generated README artifact
      uses: actions/upload-artifact@v4
      with:
        name: generated-readme
        path: README.md

  build:
    needs: [generate-build-jobs, prepare-readme]
    if: needs.generate-build-jobs.outputs.strategy_created == 'true'
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.generate-build-jobs.outputs.strategy) }}
    continue-on-error: true
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Download generated README
        uses: actions/download-artifact@v4
        with:
          name: generated-readme
          path: .
      - name: Set up jq
        run: |
          sudo apt-get update
          sudo apt-get install -y jq
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          push: true
          provenance: mode=max
          sbom: true
          platforms: |-
            ${{ join(matrix.platforms, '
            ') }}
          tags: |-
            ${{ join(matrix.tags, '
            ') }}
          build-args: |
            MONGO_VERSION=${{ matrix.name }}
      - name: Upload success marker
        if: success()
        run: |
          echo "build success for ${{ matrix.name }}" > build-success-${{ matrix.name }}.txt
      - name: Upload build success artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: build-success-${{ matrix.name }}
          path: build-success-${{ matrix.name }}.txt

  commit-readme:
    needs: [prepare-readme, build]
    if: needs.prepare-readme.result == 'success' && needs.build.result != 'skipped'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Download generated README
        uses: actions/download-artifact@v4
        with:
          name: generated-readme
          path: .
      - name: Download build success artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./build-success
      - name: Determine whether any builds succeeded
        id: build-status
        run: |
          if ls ./build-success/build-success-*.txt >/dev/null 2>&1 || find ./build-success -type f -name 'build-success-*.txt' | grep -q '.'; then
            echo "successful_builds=true" >> "$GITHUB_OUTPUT"
            echo "Found successful build artifact(s):"
            find ./build-success -type f -name 'build-success-*.txt' -print
          else
            echo "successful_builds=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Commit and push README changes
        if: steps.build-status.outputs.successful_builds == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          git add README.md
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: auto-update README badges from build_info"
            git pull origin main --rebase
            git push origin main
          fi
